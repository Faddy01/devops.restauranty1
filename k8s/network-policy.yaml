# ── Allow ingress controller to reach all services ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-all
  namespace: restauranty
spec:
  podSelector: {}          # applies to all pods in namespace
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

---
# ── Backend services: only accept traffic from within namespace ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: restauranty
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: restauranty
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow MongoDB Atlas (external) or in-cluster MongoDB
    - ports:
        - port: 27017
          protocol: TCP

---
# ── Default deny for anything not explicitly allowed ────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: restauranty
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Always allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
