apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restauranty-ingress
  namespace: restauranty
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Strip /api/auth prefix before forwarding to auth service
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    # TLS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Proxy timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # cert-manager TLS (if using Let's Encrypt)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - fawadus.azure.diogohack.shop
      secretName: restauranty-tls
  rules:
    - host: fawadus.azure.diogohack.shop
      http:
        paths:
          # ── Auth microservice ────────────────────────────────────────────
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 80

          # ── Discounts microservice ───────────────────────────────────────
          - path: /api/discounts(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: discounts-service
                port:
                  number: 80

          # ── Items microservice ───────────────────────────────────────────
          - path: /api/items(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: items-service
                port:
                  number: 80

          # ── React frontend (catch-all) ───────────────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
