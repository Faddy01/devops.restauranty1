apiVersion: v1
kind: Secret
metadata:
  name: restauranty-secrets
  namespace: restauranty
type: Opaque
# ─────────────────────────────────────────────────────────────────────────────
# DO NOT commit real values. Populate with:
#   kubectl create secret generic restauranty-secrets \
#     --from-literal=SECRET="your-jwt-secret" \
#     --from-literal=MONGODB_URI="mongodb+srv://..." \
#     --from-literal=CLOUD_NAME="your-cloudinary-name" \
#     --from-literal=CLOUD_API_KEY="your-cloudinary-key" \
#     --from-literal=CLOUD_API_SECRET="your-cloudinary-secret" \
#     --namespace restauranty
#
# Values below are base64-encoded placeholders (echo -n "value" | base64)
# ─────────────────────────────────────────────────────────────────────────────
stringData:
  SECRET: "CHANGE_ME_JWT_SECRET"
  MONGODB_URI: "CHANGE_ME_MONGODB_URI"
  CLOUD_NAME: "CHANGE_ME_CLOUD_NAME"
  CLOUD_API_KEY: "CHANGE_ME_CLOUD_API_KEY"
  CLOUD_API_SECRET: "CHANGE_ME_CLOUD_API_SECRET"
