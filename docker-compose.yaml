version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: restauranty-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - restauranty-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./backend/auth
      dockerfile: Dockerfile
    container_name: restauranty-auth
    restart: unless-stopped
    env_file: ./backend/auth/.env
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/restauranty
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - restauranty-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  discounts:
    build:
      context: ./backend/discounts
      dockerfile: Dockerfile
    container_name: restauranty-discounts
    restart: unless-stopped
    env_file: ./backend/discounts/.env
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongo:27017/restauranty
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - restauranty-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  items:
    build:
      context: ./backend/items
      dockerfile: Dockerfile
    container_name: restauranty-items
    restart: unless-stopped
    env_file: ./backend/items/.env
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://mongo:27017/restauranty
    ports:
      - "3003:3003"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - restauranty-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_SERVER_URL: https://fawadus.azure.diogohack.shop
        REACT_APP_SERVER_AUTH_URL: https://fawadus.azure.diogohack.shop
        REACT_APP_SERVER_ITEMS_URL: https://fawadus.azure.diogohack.shop
        REACT_APP_SERVER_DISCOUNTS_URL: https://fawadus.azure.diogohack.shop
    container_name: restauranty-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - restauranty-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 20s
      timeout: 5s
      retries: 3

  haproxy:
    image: haproxy:2.9-alpine
    container_name: restauranty-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - auth
      - discounts
      - items
      - frontend
    networks:
      - restauranty-net

volumes:
  mongo-data:

networks:
  restauranty-net:
    driver: bridge
