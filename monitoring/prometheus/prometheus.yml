global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: restauranty-aks
    environment: production

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yaml

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Auth microservice ────────────────────────────────────────────────────
  - job_name: auth
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [restauranty]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: auth
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3001
    metrics_path: /metrics

  # ── Discounts microservice ───────────────────────────────────────────────
  - job_name: discounts
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [restauranty]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: discounts
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3002
    metrics_path: /metrics

  # ── Items microservice ───────────────────────────────────────────────────
  - job_name: items
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [restauranty]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: items
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3003
    metrics_path: /metrics

  # ── Kubernetes node metrics (node-exporter) ──────────────────────────────
  - job_name: kubernetes-nodes
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # ── Kubernetes pods (general) ────────────────────────────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [restauranty]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: (.+);(.+)
        replacement: $1:$2
        target_label: __address__
