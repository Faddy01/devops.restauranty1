name: Restauranty CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. restaurantyacr.azurecr.io
  AKS_CLUSTER: restauranty-aks
  AKS_RESOURCE_GROUP: restauranty-rg
  NAMESPACE: restauranty

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Test (runs on every push / PR)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: auth,      dir: backend/auth }
          - { name: discounts, dir: backend/discounts }
          - { name: items,     dir: backend/items }
          - { name: frontend,  dir: client }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.dir }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.service.dir }}
        run: npm test --if-present -- --watchAll=false --passWithNoTests

      - name: Build (frontend only)
        if: matrix.service.name == 'frontend'
        working-directory: ${{ matrix.service.dir }}
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push Docker images (only on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - { name: auth,      dir: backend/auth }
          - { name: discounts, dir: backend/discounts }
          - { name: items,     dir: backend/items }
          - { name: frontend,  dir: client }

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/restauranty-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.dir }}
          file: ./${{ matrix.service.dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_API_URL=/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to AKS (only on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply secrets (if using manifest)
        run: |
          # Replace placeholder values with GitHub secrets, then apply
          sed \
            -e "s|CHANGE_ME_JWT_SECRET|${{ secrets.APP_SECRET }}|g" \
            -e "s|CHANGE_ME_MONGODB_URI|${{ secrets.MONGODB_URI }}|g" \
            -e "s|CHANGE_ME_CLOUD_NAME|${{ secrets.CLOUD_NAME }}|g" \
            -e "s|CHANGE_ME_CLOUD_API_KEY|${{ secrets.CLOUD_API_KEY }}|g" \
            -e "s|CHANGE_ME_CLOUD_API_SECRET|${{ secrets.CLOUD_API_SECRET }}|g" \
            k8s/secrets.yaml | kubectl apply -f -

      - name: Update image tags in manifests
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          for SVC in auth discounts items frontend; do
            sed -i "s|YOUR_REGISTRY/restauranty-${SVC}:latest|${{ env.REGISTRY }}/restauranty-${SVC}:${SHORT_SHA}|g" \
              k8s/${SVC}-deployment.yaml 2>/dev/null || \
            sed -i "s|YOUR_REGISTRY/restauranty-${SVC}:latest|${{ env.REGISTRY }}/restauranty-${SVC}:${SHORT_SHA}|g" \
              k8s/frontend-deployment.yaml || true
          done

      - name: Deploy all manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/auth-deployment.yaml
          kubectl apply -f k8s/discounts-deployment.yaml
          kubectl apply -f k8s/items-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/network-policy.yaml

      - name: Wait for rollouts
        run: |
          for DEP in auth discounts items frontend; do
            kubectl rollout status deployment/$DEP -n ${{ env.NAMESPACE }} --timeout=120s
          done

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}
