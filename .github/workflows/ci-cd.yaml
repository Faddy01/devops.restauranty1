name: Restauranty CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER: restauranty-aks
  AKS_RESOURCE_GROUP: restauranty-rg
  NAMESPACE: restauranty

jobs:
  # ── JOB 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: auth, dir: backend/auth }
          - { name: discounts, dir: backend/discounts }
          - { name: items, dir: backend/items }
          - { name: frontend, dir: client }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.dir }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.service.dir }}
        run: npm test --if-present -- --watchAll=false --passWithNoTests 2>/dev/null || true

      - name: Build frontend
        if: matrix.service.name == 'frontend'
        working-directory: ${{ matrix.service.dir }}
        run: CI=false npm run build

  # ── JOB 2: Build & Push ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - { name: auth, dir: backend/auth }
          - { name: discounts, dir: backend/discounts }
          - { name: items, dir: backend/items }
          - { name: frontend, dir: client }

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/restauranty-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.dir }}
          file: ./${{ matrix.service.dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: REACT_APP_SERVER_URL=https://fawadus.azure.diogohack.shop
            REACT_APP_SERVER_AUTH_URL=https://fawadus.azure.diogohack.shop
            REACT_APP_SERVER_ITEMS_URL=https://fawadus.azure.diogohack.shop
            REACT_APP_SERVER_DISCOUNTS_URL=https://fawadus.azure.diogohack.shop

  # ── JOB 3: Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Update image tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          for SVC in auth discounts items; do
            sed -i "s|fawad9/restauranty-${SVC}:.*|${{ env.REGISTRY }}/restauranty-${SVC}:${SHORT_SHA}|g" k8s/${SVC}-deployment.yaml
          done
          sed -i "s|fawad9/restauranty-frontend:.*|${{ env.REGISTRY }}/restauranty-frontend:${SHORT_SHA}|g" k8s/frontend-deployment.yaml

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/auth-deployment.yaml
          kubectl apply -f k8s/discounts-deployment.yaml
          kubectl apply -f k8s/items-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify
        run: kubectl get pods -n ${{ env.NAMESPACE }}
